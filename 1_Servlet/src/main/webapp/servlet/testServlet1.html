<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h2>개인 정보 입력 - GET</h2>
	당신의 개인 정보를 입력하겠습니다.<br/>
	데이터 입력 후 확인 버튼을 눌러주세요.<br/>
	
	<form action="/violetPizza/servlet1.do">
		<ul style="list-style: none; line-height: 200%;">
			<li>이름 : <input type="text" name="name" size="10"/></li>
			<li>성별 :
				남자<input type="radio" name="gender" value="남자"/>
				여자<input type="radio" name="gender" value="여자"/>
			</li>
			<li>나이 :
				10대 미만<input type="radio" name="age" value="10대 미만"/>
				10대<input type="radio" name="age" value="10대"/>
				20대<input type="radio" name="age" value="20대"/>
				30대<input type="radio" name="age" value="30대"/>
				40대<input type="radio" name="age" value="40대"/>
				50대<input type="radio" name="age" value="50대"/>
			</li>
			<li>사는 도시 :
				<select name="city">
					<option>서울</option>
					<option>경기</option>
					<option>강원</option>
					<option>충북</option>
					<option>충남</option>
					<option>경북</option>
					<option>경남</option>
					<option>전북</option>
					<option>전남</option>
					<option>제주</option>
				</select>
			</li>
			<li>키 : <input type="range" name="height" min="140" max="200"/></li>
			<li>좋아하는 음식 (모두 고르시오) :
				<label for="korea">한식</label><input type="checkbox" name="food" id="korea" value="한식"/>
				<label for="china">중식</label><input type="checkbox" name="food" id="china" value="중식"/>
				<label for="japan">일식</label><input type="checkbox" name="food" id="japan" value="일식"/>
				<label for="western">양식</label><input type="checkbox" name="food" id="western" value="양식"/>
				<label for="dduk">분식</label><input type="checkbox" name="food" id="dduk" value="분식"/>
			</li>
			<li>
				<br/>
				<input type="submit" value="확인"/>
			</li>
		</ul>	
	</form>
</body>
</html>
